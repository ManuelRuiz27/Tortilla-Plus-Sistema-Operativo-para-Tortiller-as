services:
  - type: web
    name: tortilla-plus-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run db:generate -w @tortilla-plus/api && npm run build -w @tortilla-plus/api
    startCommand: npm run start -w @tortilla-plus/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYMENT_SECRET_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: BILLING_PROVIDER
        value: mock
      - key: PHYSICAL_INTEGRATIONS_MODE
        value: mock

  - type: web
    name: tortilla-plus-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build -w @tortilla-plus/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_USE_MOCKS
        value: "false"
