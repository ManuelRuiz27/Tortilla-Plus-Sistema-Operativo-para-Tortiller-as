openapi: 3.1.0
info:
  title: Tortilla Plus Billing API
  version: 0.1.0
  description: >
    Contrato OpenAPI V0.1 para el módulo fiscal de Tortilla Plus — V1 Operativa Comercial.
    Este contrato cubre POS fiscal, portal público de autofactura, Manager Billing,
    globales, manual review, cancelaciones, conciliación, configuración fiscal,
    exportaciones y permisos.

servers:
  - url: https://api.tortillaplus.mx
    description: Producción
  - url: https://staging-api.tortillaplus.mx
    description: Staging
  - url: http://localhost:3000
    description: Local

tags:
  - name: POS Sales
  - name: Public Billing
  - name: Manager Billing
  - name: Global Invoices
  - name: Manual Review
  - name: Reconciliation
  - name: Exports
  - name: Fiscal Settings
  - name: Permissions

security:
  - bearerAuth: []

paths:
  /me/permissions:
    get:
      tags: [Permissions]
      summary: Obtener permisos efectivos del usuario autenticado
      operationId: getMyPermissions
      responses:
        "200":
          description: Permisos efectivos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPermissionsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /manager/billing/permissions:
    get:
      tags: [Permissions]
      summary: Obtener permisos efectivos para Manager Billing
      operationId: getBillingPermissions
      responses:
        "200":
          description: Permisos de billing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPermissionsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /pos/sales:
    post:
      tags: [POS Sales]
      summary: Crear venta POS en borrador
      operationId: createPosSale
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleRequest"
      responses:
        "201":
          description: Venta creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /pos/sales/{saleId}/complete:
    post:
      tags: [POS Sales]
      summary: Completar venta POS y obtener payload de impresión
      operationId: completePosSale
      parameters:
        - $ref: "#/components/parameters/SaleId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSaleRequest"
      responses:
        "200":
          description: Venta completada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteSaleResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /pos/sales/search:
    get:
      tags: [POS Sales]
      summary: Búsqueda rápida de tickets POS
      description: Búsqueda limitada para POS. El backend aplica límites por caja, turno, rol y rango permitido.
      operationId: searchPosSales
      parameters:
        - name: folio
          in: query
          schema:
            type: string
        - name: amount
          in: query
          schema:
            type: string
            pattern: "^[0-9]+(\\.[0-9]{2})?$"
        - name: paymentMethod
          in: query
          schema:
            $ref: "#/components/schemas/PaymentMethod"
        - name: last4
          in: query
          schema:
            type: string
            minLength: 4
            maxLength: 4
        - name: reference
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Resultados de búsqueda rápida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleSearchResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /pos/sales/{saleId}/print:
    post:
      tags: [POS Sales]
      summary: Obtener payload de impresión de una venta
      operationId: getSalePrintPayload
      parameters:
        - $ref: "#/components/parameters/SaleId"
      responses:
        "200":
          description: Payload de impresión
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrintPayloadResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /pos/sales/{saleId}/reprint:
    post:
      tags: [POS Sales]
      summary: Reimprimir ticket y registrar auditoría
      operationId: reprintSaleTicket
      parameters:
        - $ref: "#/components/parameters/SaleId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReprintRequest"
      responses:
        "200":
          description: Payload de reimpresión
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrintPayloadResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /public/billing/receipts/{token}:
    get:
      tags: [Public Billing]
      security: []
      summary: Consultar receipt público por token QR
      operationId: getPublicReceipt
      parameters:
        - $ref: "#/components/parameters/ReceiptToken"
      responses:
        "200":
          description: Receipt público
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicReceiptResponse"
        "404":
          $ref: "#/components/responses/PublicNotFoundError"
        "410":
          description: Receipt vencido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicReceiptResponse"

  /public/billing/receipts/{token}/invoice:
    post:
      tags: [Public Billing]
      security: []
      summary: Solicitar autofactura pública
      operationId: requestPublicInvoice
      parameters:
        - $ref: "#/components/parameters/ReceiptToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicInvoiceRequest"
      responses:
        "200":
          description: Factura generada inmediatamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInvoiceStatusResponse"
        "202":
          description: Factura en procesamiento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInvoiceStatusResponse"
        "409":
          $ref: "#/components/responses/ConflictError"
        "410":
          $ref: "#/components/responses/ReceiptExpiredError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitError"

  /public/billing/receipts/{token}/invoice-status:
    get:
      tags: [Public Billing]
      security: []
      summary: Consultar estado de autofactura pública
      operationId: getPublicInvoiceStatus
      parameters:
        - $ref: "#/components/parameters/ReceiptToken"
      responses:
        "200":
          description: Estado de solicitud de factura
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInvoiceStatusResponse"
        "404":
          $ref: "#/components/responses/PublicNotFoundError"
        "410":
          $ref: "#/components/responses/ReceiptExpiredError"

  /public/billing/invoices/{invoiceId}/pdf:
    get:
      tags: [Public Billing]
      security: []
      summary: Descargar PDF público de factura
      operationId: downloadPublicInvoicePdf
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: PDF generado bajo demanda
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/PublicNotFoundError"

  /public/billing/invoices/{invoiceId}/xml:
    get:
      tags: [Public Billing]
      security: []
      summary: Descargar XML público de factura
      operationId: downloadPublicInvoiceXml
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: XML fiscal
          content:
            application/xml:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/PublicNotFoundError"

  /manager/billing/dashboard:
    get:
      tags: [Manager Billing]
      summary: Obtener dashboard fiscal
      operationId: getBillingDashboard
      parameters:
        - $ref: "#/components/parameters/BranchIdQuery"
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
      responses:
        "200":
          description: Dashboard fiscal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingDashboardResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/billing/invoices:
    get:
      tags: [Manager Billing]
      summary: Buscar facturas
      operationId: listBillingInvoices
      parameters:
        - $ref: "#/components/parameters/BranchIdQuery"
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
        - name: uuid
          in: query
          schema:
            type: string
        - name: rfc
          in: query
          schema:
            type: string
        - name: folio
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/InvoiceStatus"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/InvoiceType"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Lista paginada de facturas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/billing/invoices/{invoiceId}:
    get:
      tags: [Manager Billing]
      summary: Obtener detalle de factura
      operationId: getBillingInvoice
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: Detalle de factura
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetailResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /manager/billing/invoices/{invoiceId}/pdf:
    get:
      tags: [Manager Billing]
      summary: Descargar PDF de factura desde Manager
      operationId: downloadManagerInvoicePdf
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: PDF generado bajo demanda
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /manager/billing/invoices/{invoiceId}/xml:
    get:
      tags: [Manager Billing]
      summary: Descargar XML de factura desde Manager
      operationId: downloadManagerInvoiceXml
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
      responses:
        "200":
          description: XML fiscal
          content:
            application/xml:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /manager/billing/invoices/{invoiceId}/cancel:
    post:
      tags: [Manager Billing]
      summary: Solicitar cancelación de CFDI
      operationId: cancelBillingInvoice
      parameters:
        - $ref: "#/components/parameters/InvoiceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelInvoiceRequest"
      responses:
        "202":
          description: Cancelación solicitada/procesándose
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelInvoiceResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /manager/billing/global/daily/preview:
    get:
      tags: [Global Invoices]
      summary: Obtener preview de global diaria
      operationId: previewDailyGlobal
      parameters:
        - $ref: "#/components/parameters/BranchIdQuery"
        - name: businessDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Preview de global diaria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalBatchPreviewResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/billing/global/daily/prepare:
    post:
      tags: [Global Invoices]
      summary: Preparar global diaria
      operationId: prepareDailyGlobal
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrepareGlobalRequest"
      responses:
        "201":
          description: Lote preparado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalBatchResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /manager/billing/global/daily/{batchId}/confirm:
    post:
      tags: [Global Invoices]
      summary: Confirmar timbrado de global diaria
      operationId: confirmDailyGlobal
      parameters:
        - $ref: "#/components/parameters/BatchId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmGlobalRequest"
      responses:
        "202":
          description: Timbrado en proceso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalBatchResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /manager/billing/global/pending-period/preview:
    get:
      tags: [Global Invoices]
      summary: Obtener preview de global de rezagados
      operationId: previewPendingPeriodGlobal
      parameters:
        - $ref: "#/components/parameters/BranchIdQuery"
        - name: period
          in: query
          required: true
          schema:
            type: string
            example: "2026-05"
      responses:
        "200":
          description: Preview de global rezagados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalBatchPreviewResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/billing/global/pending-period/prepare:
    post:
      tags: [Global Invoices]
      summary: Preparar global de rezagados
      operationId: preparePendingPeriodGlobal
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreparePendingPeriodGlobalRequest"
      responses:
        "201":
          description: Lote preparado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalBatchResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /manager/billing/global/pending-period/{batchId}/confirm:
    post:
      tags: [Global Invoices]
      summary: Confirmar timbrado de global de rezagados
      operationId: confirmPendingPeriodGlobal
      parameters:
        - $ref: "#/components/parameters/BatchId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmGlobalRequest"
      responses:
        "202":
          description: Timbrado en proceso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalBatchResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /manager/billing/manual-review:
    get:
      tags: [Manual Review]
      summary: Listar casos de manual review
      operationId: listManualReviewCases
      parameters:
        - $ref: "#/components/parameters/BranchIdQuery"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ManualReviewStatus"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Casos paginados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualReviewListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/billing/manual-review/{caseId}:
    get:
      tags: [Manual Review]
      summary: Obtener detalle de caso manual review
      operationId: getManualReviewCase
      parameters:
        - $ref: "#/components/parameters/CaseId"
      responses:
        "200":
          description: Detalle manual review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualReviewCaseResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [Manual Review]
      summary: Corregir campos permitidos de manual review
      operationId: updateManualReviewCase
      parameters:
        - $ref: "#/components/parameters/CaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateManualReviewRequest"
      responses:
        "200":
          description: Caso actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualReviewCaseResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /manager/billing/manual-review/{caseId}/retry:
    post:
      tags: [Manual Review]
      summary: Reintentar timbrado de caso manual review
      operationId: retryManualReviewCase
      parameters:
        - $ref: "#/components/parameters/CaseId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Reintento en proceso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualReviewCaseResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /manager/billing/manual-review/{caseId}/close:
    post:
      tags: [Manual Review]
      summary: Cerrar caso manual review
      operationId: closeManualReviewCase
      parameters:
        - $ref: "#/components/parameters/CaseId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseManualReviewRequest"
      responses:
        "200":
          description: Caso cerrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualReviewCaseResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/reconciliation/imports:
    post:
      tags: [Reconciliation]
      summary: Subir archivo CSV/XLSX de conciliación
      operationId: uploadReconciliationImport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ReconciliationImportUploadRequest"
      responses:
        "201":
          description: Import creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationImportResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      tags: [Reconciliation]
      summary: Listar imports de conciliación
      operationId: listReconciliationImports
      parameters:
        - $ref: "#/components/parameters/BranchIdQuery"
        - name: provider
          in: query
          schema:
            $ref: "#/components/schemas/ReconciliationProvider"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ReconciliationImportStatus"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Imports paginados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationImportListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/reconciliation/imports/{importId}:
    get:
      tags: [Reconciliation]
      summary: Obtener detalle de import de conciliación
      operationId: getReconciliationImport
      parameters:
        - $ref: "#/components/parameters/ImportId"
      responses:
        "200":
          description: Detalle de import
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationImportResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /manager/reconciliation/imports/{importId}/movements:
    get:
      tags: [Reconciliation]
      summary: Listar movimientos bancarios de un import
      operationId: listReconciliationMovements
      parameters:
        - $ref: "#/components/parameters/ImportId"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ReconciliationStatus"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Movimientos paginados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationMovementListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/reconciliation/movements/{movementId}/candidates:
    get:
      tags: [Reconciliation]
      summary: Obtener candidatos POS para movimiento bancario
      operationId: listMovementCandidates
      parameters:
        - $ref: "#/components/parameters/MovementId"
      responses:
        "200":
          description: Candidatos ordenados por score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationCandidateListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/reconciliation/matches/{matchId}/confirm:
    post:
      tags: [Reconciliation]
      summary: Confirmar match de conciliación
      operationId: confirmReconciliationMatch
      parameters:
        - $ref: "#/components/parameters/MatchId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmMatchRequest"
      responses:
        "200":
          description: Match confirmado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationMatchResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /manager/reconciliation/matches/{matchId}/reject:
    post:
      tags: [Reconciliation]
      summary: Rechazar match de conciliación
      operationId: rejectReconciliationMatch
      parameters:
        - $ref: "#/components/parameters/MatchId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectMatchRequest"
      responses:
        "200":
          description: Match rechazado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationMatchResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/reconciliation/incidents:
    get:
      tags: [Reconciliation]
      summary: Listar incidencias de conciliación
      operationId: listReconciliationIncidents
      parameters:
        - $ref: "#/components/parameters/BranchIdQuery"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/ReconciliationIncidentType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ReconciliationIncidentStatus"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Incidencias paginadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationIncidentListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/reconciliation/incidents/{incidentId}:
    get:
      tags: [Reconciliation]
      summary: Obtener detalle de incidencia
      operationId: getReconciliationIncident
      parameters:
        - $ref: "#/components/parameters/IncidentId"
      responses:
        "200":
          description: Detalle de incidencia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationIncidentResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/reconciliation/incidents/{incidentId}/resolve:
    post:
      tags: [Reconciliation]
      summary: Resolver incidencia de conciliación
      operationId: resolveReconciliationIncident
      parameters:
        - $ref: "#/components/parameters/IncidentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveIncidentRequest"
      responses:
        "200":
          description: Incidencia resuelta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationIncidentResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/reconciliation/incidents/{incidentId}/ignore:
    post:
      tags: [Reconciliation]
      summary: Ignorar incidencia de conciliación
      operationId: ignoreReconciliationIncident
      parameters:
        - $ref: "#/components/parameters/IncidentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IgnoreIncidentRequest"
      responses:
        "200":
          description: Incidencia ignorada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationIncidentResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/reconciliation/manual-search:
    post:
      tags: [Reconciliation]
      summary: Buscar venta POS manualmente para conciliación
      operationId: manualReconciliationSaleSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualSaleSearchRequest"
      responses:
        "200":
          description: Resultados de búsqueda manual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationCandidateListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/billing/exports/types:
    get:
      tags: [Exports]
      summary: Listar tipos de exportación disponibles
      operationId: listExportTypes
      responses:
        "200":
          description: Tipos disponibles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportTypesResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/billing/exports:
    post:
      tags: [Exports]
      summary: Solicitar exportación fiscal
      operationId: createBillingExport
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExportRequest"
      responses:
        "202":
          description: Exportación en cola
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportJobResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      tags: [Exports]
      summary: Listar exportaciones
      operationId: listBillingExports
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ExportStatus"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/ExportType"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Exportaciones paginadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportJobListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/billing/exports/{exportJobId}:
    get:
      tags: [Exports]
      summary: Obtener estado de exportación
      operationId: getBillingExport
      parameters:
        - $ref: "#/components/parameters/ExportJobId"
      responses:
        "200":
          description: Estado de exportación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportJobResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /manager/billing/exports/{exportJobId}/download:
    get:
      tags: [Exports]
      summary: Descargar exportación
      operationId: downloadBillingExport
      parameters:
        - $ref: "#/components/parameters/ExportJobId"
      responses:
        "200":
          description: Archivo de exportación
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/zip:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "410":
          $ref: "#/components/responses/ExpiredError"

  /manager/billing/config:
    get:
      tags: [Fiscal Settings]
      summary: Obtener configuración fiscal
      operationId: getFiscalConfig
      responses:
        "200":
          description: Configuración fiscal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiscalConfigResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    patch:
      tags: [Fiscal Settings]
      summary: Actualizar configuración fiscal
      operationId: updateFiscalConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFiscalConfigRequest"
      responses:
        "200":
          description: Configuración actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiscalConfigResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /manager/billing/config/validate:
    post:
      tags: [Fiscal Settings]
      summary: Validar configuración fiscal
      operationId: validateFiscalConfig
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Validación iniciada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiscalConfigValidationResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /manager/billing/config/activate:
    post:
      tags: [Fiscal Settings]
      summary: Activar facturación si checklist está completo
      operationId: activateFiscalConfig
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Facturación activa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FiscalConfigResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
    SaleId:
      name: saleId
      in: path
      required: true
      schema:
        type: string
    ReceiptToken:
      name: token
      in: path
      required: true
      schema:
        type: string
    InvoiceId:
      name: invoiceId
      in: path
      required: true
      schema:
        type: string
    BatchId:
      name: batchId
      in: path
      required: true
      schema:
        type: string
    CaseId:
      name: caseId
      in: path
      required: true
      schema:
        type: string
    ImportId:
      name: importId
      in: path
      required: true
      schema:
        type: string
    MovementId:
      name: movementId
      in: path
      required: true
      schema:
        type: string
    MatchId:
      name: matchId
      in: path
      required: true
      schema:
        type: string
    IncidentId:
      name: incidentId
      in: path
      required: true
      schema:
        type: string
    ExportJobId:
      name: exportJobId
      in: path
      required: true
      schema:
        type: string
    BranchIdQuery:
      name: branchId
      in: query
      required: false
      schema:
        type: string
    StartDate:
      name: startDate
      in: query
      required: false
      schema:
        type: string
        format: date
    EndDate:
      name: endDate
      in: query
      required: false
      schema:
        type: string
        format: date
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  responses:
    BadRequestError:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Error de validación
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: No autenticado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Sin permiso
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: No encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PublicNotFoundError:
      description: Recurso público no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Conflicto de estado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimitError:
      description: Demasiados intentos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ReceiptExpiredError:
      description: Receipt vencido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ExpiredError:
      description: Recurso expirado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    Money:
      type: string
      pattern: "^[0-9]+(\\.[0-9]{2})$"
      examples: ["86.00"]

    Currency:
      type: string
      enum: [MXN]

    UserRole:
      type: string
      enum: [cashier, supervisor, manager]

    PaymentMethod:
      type: string
      enum: [cash, card, mixed, credit]

    FiscalIntent:
      type: string
      enum:
        - no_invoice
        - customer_invoice
        - auto_customer_invoice
        - daily_global
        - pending_global

    FiscalStatus:
      type: string
      enum:
        - no_invoice
        - eligible_for_daily_global
        - pending_customer_invoice
        - processing_invoice
        - customer_invoiced
        - requires_manual_review
        - expired
        - included_in_global
        - cancel_requested
        - cancelled

    ReceiptStatus:
      type: string
      enum: [active, used, expired, cancelled, manual_review]

    InvoiceStatus:
      type: string
      enum:
        - draft
        - processing
        - stamped
        - failed
        - requires_manual_review
        - cancel_requested
        - cancel_processing
        - cancelled
        - cancel_failed

    InvoiceType:
      type: string
      enum: [individual, global_daily, global_pending_period]

    TicketTemplate:
      type: string
      enum:
        - ticket_simple
        - ticket_qr_autofactura
        - ticket_facturado
        - ticket_vencido
        - ticket_en_revision
        - ticket_pending_reference

    GlobalBatchStatus:
      type: string
      enum:
        - not_prepared
        - prepared
        - confirmed
        - stamping
        - stamped
        - failed
        - requires_review

    ManualReviewStatus:
      type: string
      enum:
        - requires_manual_review
        - retry_scheduled
        - retrying
        - resolved
        - closed

    ReconciliationProvider:
      type: string
      enum: [bbva, mercadopago, clip, other]

    ReconciliationStatus:
      type: string
      enum:
        - unmatched
        - matched
        - high_confidence
        - needs_review
        - duplicate_candidate
        - pending_reference
        - ignored
        - resolved

    ReconciliationImportStatus:
      type: string
      enum:
        - uploaded
        - processing
        - processed
        - processed_with_warnings
        - failed
        - cancelled

    ReconciliationIncidentType:
      type: string
      enum:
        - unmatched
        - duplicate_candidate
        - pending_reference
        - possible_cash_error
        - manual_review_required

    ReconciliationIncidentStatus:
      type: string
      enum: [open, in_review, resolved, ignored, closed]

    ExportType:
      type: string
      enum:
        - facturas_emitidas
        - xml_facturas
        - global_diaria
        - global_rezagados
        - ventas_fiscales
        - autofacturas_pendientes
        - manual_review
        - cancelaciones_cfdi
        - conciliacion
        - incidencias_conciliacion

    ExportFormat:
      type: string
      enum: [csv, xlsx, zip]

    ExportStatus:
      type: string
      enum: [queued, processing, ready, failed, expired]

    FiscalConfigStatus:
      type: string
      enum:
        - draft
        - validating
        - ready
        - active
        - error
        - expired_certificates
        - provider_connection_error
        - test_stamp_failed

    Pagination:
      type: object
      required: [page, pageSize, total, totalPages]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
        code:
          type: string

    ErrorResponse:
      type: object
      required: [statusCode, error, message]
      properties:
        statusCode:
          type: integer
        error:
          type: string
          examples: [VALIDATION_ERROR, FORBIDDEN, NOT_FOUND]
        message:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"

    UserPermissionsResponse:
      type: object
      required: [userId, role, permissions]
      properties:
        userId:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        permissions:
          type: array
          items:
            type: string

    BillingPermissionsResponse:
      type: object
      required: [role, modules]
      properties:
        role:
          $ref: "#/components/schemas/UserRole"
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleAccess"

    ModuleAccess:
      type: object
      required: [module, access, allowedActions]
      properties:
        module:
          type: string
        access:
          type: string
          enum: [allowed, denied, limited, requires_manager, requires_supervisor_or_manager]
        allowedActions:
          type: array
          items:
            type: string

    SaleItemInput:
      type: object
      required: [productId, name, quantity, unit, unitPrice, total]
      properties:
        productId:
          type: string
        name:
          type: string
        quantity:
          type: string
        unit:
          type: string
          examples: [kg, pza, paquete]
        unitPrice:
          $ref: "#/components/schemas/Money"
        total:
          $ref: "#/components/schemas/Money"

    SaleItem:
      allOf:
        - $ref: "#/components/schemas/SaleItemInput"
        - type: object
          properties:
            saleItemId:
              type: string

    PaymentInput:
      type: object
      required: [method, amount]
      properties:
        method:
          $ref: "#/components/schemas/PaymentMethod"
        amount:
          $ref: "#/components/schemas/Money"
        provider:
          type: string
          examples: [bbva, mercadopago, clip]
        reference:
          type: string
          nullable: true
        authorization:
          type: string
          nullable: true
        last4:
          type: string
          nullable: true
          minLength: 4
          maxLength: 4
        terminalId:
          type: string
          nullable: true

    Payment:
      allOf:
        - $ref: "#/components/schemas/PaymentInput"
        - type: object
          properties:
            paymentId:
              type: string
            reconciliationStatus:
              $ref: "#/components/schemas/ReconciliationStatus"

    CreateSaleRequest:
      type: object
      required: [branchId, registerId, items]
      properties:
        branchId:
          type: string
        registerId:
          type: string
        customerId:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItemInput"
        notes:
          type: string
          nullable: true

    CompleteSaleRequest:
      type: object
      required: [payments]
      properties:
        payments:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PaymentInput"
        customerRequestedInvoice:
          type: boolean
          nullable: true
          description: Solo aplica cuando el método de pago no obliga QR automático.
        amountReceived:
          $ref: "#/components/schemas/Money"

    Sale:
      type: object
      required: [saleId, folio, branchId, total, currency, fiscalStatus, createdAt]
      properties:
        saleId:
          type: string
        folio:
          type: string
        branchId:
          type: string
        registerId:
          type: string
        cashierId:
          type: string
        cashierName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        subtotal:
          $ref: "#/components/schemas/Money"
        tax:
          $ref: "#/components/schemas/Money"
        total:
          $ref: "#/components/schemas/Money"
        currency:
          $ref: "#/components/schemas/Currency"
        fiscalIntent:
          $ref: "#/components/schemas/FiscalIntent"
        fiscalStatus:
          $ref: "#/components/schemas/FiscalStatus"
        createdAt:
          type: string
          format: date-time

    SaleResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Sale"

    CompleteSaleResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [sale, printRequired]
          properties:
            sale:
              $ref: "#/components/schemas/Sale"
            printRequired:
              type: boolean
            printPayload:
              $ref: "#/components/schemas/PrintPayload"
            warnings:
              type: array
              items:
                $ref: "#/components/schemas/Warning"

    Warning:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples: [PENDING_REFERENCE]
        message:
          type: string

    SaleSearchResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SaleSearchItem"
        pagination:
          $ref: "#/components/schemas/Pagination"

    SaleSearchItem:
      type: object
      required: [saleId, folio, time, total, paymentMethod, fiscalStatus]
      properties:
        saleId:
          type: string
        folio:
          type: string
        time:
          type: string
          format: date-time
        total:
          $ref: "#/components/schemas/Money"
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        fiscalStatus:
          $ref: "#/components/schemas/FiscalStatus"
        hasQr:
          type: boolean
        last4:
          type: string
          nullable: true

    PrintPayloadResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/PrintPayload"

    PrintPayload:
      type: object
      required: [template, folio, businessName, branchName, dateTime, items, payments, total]
      properties:
        template:
          $ref: "#/components/schemas/TicketTemplate"
        folio:
          type: string
        businessName:
          type: string
        branchName:
          type: string
        businessRfc:
          type: string
          nullable: true
        cashierName:
          type: string
        cashRegister:
          type: string
        dateTime:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        total:
          $ref: "#/components/schemas/Money"
        fiscal:
          $ref: "#/components/schemas/PrintFiscalData"

    PrintFiscalData:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/FiscalStatus"
        qrUrl:
          type: string
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        invoiceUuid:
          type: string
          nullable: true
        invoiceDate:
          type: string
          format: date-time
          nullable: true
        reprintCount:
          type: integer
          default: 0
        showQr:
          type: boolean
          default: true

    ReprintRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true

    PublicReceiptResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/PublicReceipt"

    PublicReceipt:
      type: object
      required: [receiptId, token, status, folio, businessName, branchName, saleDate, total, deadline, canInvoice]
      properties:
        receiptId:
          type: string
        token:
          type: string
        status:
          $ref: "#/components/schemas/ReceiptStatus"
        folio:
          type: string
        businessName:
          type: string
        branchName:
          type: string
        saleDate:
          type: string
          format: date-time
        total:
          $ref: "#/components/schemas/Money"
        currency:
          $ref: "#/components/schemas/Currency"
        deadline:
          type: string
          format: date-time
        canInvoice:
          type: boolean
        contact:
          $ref: "#/components/schemas/PublicBusinessContact"
        items:
